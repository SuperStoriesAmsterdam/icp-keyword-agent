<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICP & Keyword Research Agent — SuperStories</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <div class="header-content">
      <h1>ICP & Keyword Research Agent</h1>
      <span class="brand">SuperStories</span>
    </div>
  </header>

  <!-- Phase Pipeline -->
  <nav class="pipeline">
    <div class="phase" data-phase="intake"><span class="dot"></span><span class="label">Intake</span></div>
    <div class="connector"></div>
    <div class="phase" data-phase="product-definition"><span class="dot"></span><span class="label">Product</span></div>
    <div class="connector"></div>
    <div class="phase" data-phase="search-sources"><span class="dot"></span><span class="label">Sources</span></div>
    <div class="connector"></div>
    <div class="phase" data-phase="icp-research"><span class="dot"></span><span class="label">ICP Research</span></div>
    <div class="connector"></div>
    <div class="phase" data-phase="icp-review"><span class="dot"></span><span class="label">ICP Review</span><span class="hitl">HITL</span></div>
    <div class="connector"></div>
    <div class="phase" data-phase="keyword-research"><span class="dot"></span><span class="label">Keywords</span></div>
    <div class="connector"></div>
    <div class="phase" data-phase="keyword-review"><span class="dot"></span><span class="label">KW Review</span><span class="hitl">HITL</span></div>
    <div class="connector"></div>
    <div class="phase" data-phase="deliver"><span class="dot"></span><span class="label">Deliver</span></div>
  </nav>

  <!-- Main content -->
  <main>
    <!-- Status -->
    <div class="status-line">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Ready</span>
    </div>

    <!-- Conversation -->
    <div class="conversation" id="conversation">
      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <p class="empty-title">Ready to research</p>
        <p class="empty-sub">Start a new ICP & keyword research workflow.</p>
        <button class="btn" id="btnStart" onclick="startAgent()">Start Research</button>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area" id="inputArea" hidden>
      <form onsubmit="sendChat(event)">
        <textarea id="chatInput" placeholder="Type your response..." rows="3"></textarea>
        <div class="input-actions">
          <span class="input-hint">Press Shift+Enter for new line</span>
          <button type="submit" class="btn" id="btnSend">Send</button>
        </div>
      </form>
    </div>
  </main>

  <script>
    const PHASES = ['intake','product-definition','search-sources','icp-research','icp-review','keyword-research','keyword-review','deliver','complete'];
    let agentRunning = false;
    let eventSource = null;

    // ── SSE ────────────────────────────────────────────────────

    function connectSSE() {
      eventSource = new EventSource('/api/stream');
      eventSource.onmessage = (e) => handleEvent(JSON.parse(e.data));
      eventSource.onerror = () => {
        setTimeout(() => { if (eventSource) eventSource.close(); connectSSE(); }, 3000);
      };
    }

    function handleEvent(data) {
      switch (data.type) {
        case 'connected':
          agentRunning = data.running;
          if (data.messages?.length > 0) {
            document.getElementById('emptyState').hidden = true;
            data.messages.forEach(msg => renderMessage(msg));
          }
          updateUI();
          break;
        case 'started':
          agentRunning = true;
          document.getElementById('emptyState').hidden = true;
          updateUI();
          break;
        case 'message':
          renderMessage(data.message);
          break;
        case 'waiting':
          updateUI();
          document.getElementById('chatInput').focus();
          break;
        case 'stopped':
        case 'complete':
          agentRunning = false;
          updateUI();
          break;
        case 'error':
          renderMessage({ role: 'system', content: data.content, timestamp: new Date().toISOString() });
          break;
      }
      fetchStatus();
    }

    // ── Controls ───────────────────────────────────────────────

    async function startAgent() {
      const btn = document.getElementById('btnStart');
      btn.disabled = true;
      btn.textContent = 'Starting...';
      try {
        await fetch('/api/start', { method: 'POST' });
      } catch {
        btn.disabled = false;
        btn.textContent = 'Start Research';
      }
    }

    async function sendChat(e) {
      e.preventDefault();
      const ta = document.getElementById('chatInput');
      const msg = ta.value.trim();
      if (!msg) return;
      ta.value = '';
      ta.style.height = 'auto';
      await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg }),
      });
    }

    // ── Render ─────────────────────────────────────────────────

    function renderMessage(msg) {
      const conv = document.getElementById('conversation');
      const el = document.createElement('div');
      el.className = 'msg msg-' + msg.role;

      if (msg.role === 'system') {
        el.innerHTML = `<span class="msg-system-text">${esc(msg.content)}</span>`;
      } else {
        const who = msg.role === 'assistant' ? 'Agent' : 'You';
        el.innerHTML = `<div class="msg-who">${who}</div><div class="msg-body">${md(msg.content)}</div>`;
      }

      conv.appendChild(el);
      conv.scrollTop = conv.scrollHeight;
    }

    function md(text) {
      if (!text) return '';
      return esc(text)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^## (.+)$/gm, '<h3>$1</h3>')
        .replace(/^# (.+)$/gm, '<h3>$1</h3>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/\n{2,}/g, '</p><p>')
        .replace(/\n/g, '<br>');
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // ── UI state ───────────────────────────────────────────────

    function updateUI() {
      const inputArea = document.getElementById('inputArea');
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');

      if (agentRunning) {
        inputArea.hidden = false;
        dot.className = 'status-dot active';
        text.textContent = 'Agent is working...';
      } else {
        inputArea.hidden = true;
        dot.className = 'status-dot idle';
        text.textContent = document.querySelectorAll('.msg').length > 0 ? 'Session ended' : 'Ready';
      }
    }

    async function fetchStatus() {
      try {
        const r = await fetch('/api/status');
        const d = await r.json();
        updatePipeline(d.phase);
      } catch {}
    }

    function updatePipeline(phase) {
      const idx = PHASES.indexOf(phase);
      document.querySelectorAll('.phase').forEach(el => {
        const i = PHASES.indexOf(el.dataset.phase);
        el.classList.remove('active','complete','inactive');
        if (phase === 'idle') el.classList.add('inactive');
        else if (phase === 'complete') el.classList.add('complete');
        else if (i < idx) el.classList.add('complete');
        else if (i === idx) el.classList.add('active');
        else el.classList.add('inactive');
      });
    }

    // ── Textarea auto-resize + Enter to send ───────────────────

    const ta = document.getElementById('chatInput');
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
    });
    ta.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        document.querySelector('.input-area form').requestSubmit();
      }
    });

    // ── Init ───────────────────────────────────────────────────

    connectSSE();
    fetchStatus();
  </script>
</body>
</html>
